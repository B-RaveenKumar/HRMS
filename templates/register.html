<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MediCare Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --info-color: #3498db;
        }
        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, #34495e 100%);
            min-height: 100vh;
            padding: 30px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }
        .register-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 40px;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        .register-header h1 {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 2rem;
            margin: 0;
        }
        .register-header p {
            color: #7f8c8d;
            margin: 5px 0 0 0;
        }
        .role-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .role-tab {
            flex: 1;
            padding: 12px;
            background: #ecf0f1;
            border: 2px solid transparent;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
            text-align: center;
            color: #34495e;
        }
        .role-tab:hover {
            background: #d5dbdb;
            border-color: var(--info-color);
        }
        .role-tab.active {
            background: linear-gradient(135deg, var(--primary-color) 0%, #34495e 100%);
            color: white;
            border-color: var(--info-color);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--info-color);
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-row .form-group {
            margin-bottom: 0;
        }
        .register-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--success-color) 0%, #229954 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.3);
        }
        .error-msg {
            color: var(--danger-color);
            font-weight: 500;
            margin: 10px 0;
            padding: 10px;
            background: #fadbd8;
            border-radius: 6px;
            display: none;
        }
        .success-msg {
            color: var(--success-color);
            font-weight: 500;
            margin: 10px 0;
            padding: 10px;
            background: #d5f4e6;
            border-radius: 6px;
            display: none;
        }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }
        .footer-text a {
            color: var(--info-color);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
        .hidden { display: none !important; }
        .required-note {
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-top: 20px;
            text-align: center;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="register-card">
            <div class="register-header">
                <i class="fas fa-hospital-user"></i>
                <h1>MediCare Pro</h1>
                <p>Create Your Account</p>
            </div>
        
        <!-- Role Selection Tabs -->
        <div class="role-tabs">
            <button class="role-tab active" onclick="switchRole('doctor')">
                <i class="fas fa-stethoscope"></i><br><small>Doctor</small>
            </button>
            <button class="role-tab" onclick="switchRole('receptionist')">
                <i class="fas fa-user-tie"></i><br><small>Receptionist</small>
            </button>
            <button class="role-tab" onclick="switchRole('patient')">
                <i class="fas fa-user"></i><br><small>Patient</small>
            </button>
        </div>

        <!-- Doctor Registration Form -->
        <div id="doctor-form" class="role-form">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="doctor-name" placeholder="Dr. John Smith">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-stethoscope"></i> Specialization *</label>
                    <select id="doctor-specialty">
                        <option value="">Select Specialty</option>
                        <option value="Cardiology">Cardiology</option>
                        <option value="Neurology">Neurology</option>
                        <option value="Orthopedics">Orthopedics</option>
                        <option value="Dermatology">Dermatology</option>
                        <option value="Pediatrics">Pediatrics</option>
                        <option value="General">General Practice</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address *</label>
                <input type="email" id="doctor-email" placeholder="doctor@hospital.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone Number *</label>
                <input type="tel" id="doctor-phone" placeholder="(123) 456-7890">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password *</label>
                <input type="password" id="doctor-password" placeholder="Min 8 characters with uppercase, lowercase, number">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm Password *</label>
                <input type="password" id="doctor-password-confirm" placeholder="Confirm password">
            </div>
            <div id="doctor-error" class="error-msg"></div>
            <div id="doctor-success" class="success-msg"></div>
            <button class="register-btn" onclick="register('doctor')"><i class="fas fa-user-plus"></i> Create Doctor Account</button>
        </div>

        <!-- Receptionist Registration Form -->
        <div id="receptionist-form" class="role-form hidden">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="receptionist-name" placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number *</label>
                    <input type="tel" id="receptionist-phone" placeholder="(123) 456-7890">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address *</label>
                <input type="email" id="receptionist-email" placeholder="receptionist@hospital.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password *</label>
                <input type="password" id="receptionist-password" placeholder="Min 8 characters with uppercase, lowercase, number">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm Password *</label>
                <input type="password" id="receptionist-password-confirm" placeholder="Confirm password">
            </div>
            <div id="receptionist-error" class="error-msg"></div>
            <div id="receptionist-success" class="success-msg"></div>
            <button class="register-btn" onclick="register('receptionist')"><i class="fas fa-user-plus"></i> Create Receptionist Account</button>
        </div>

        <!-- Patient Registration Form -->
        <div id="patient-form" class="role-form hidden">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="patient-name" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-birthday-cake"></i> Age *</label>
                    <input type="number" id="patient-age" placeholder="25" min="1" max="120">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> Gender *</label>
                    <select id="patient-gender">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number *</label>
                    <input type="tel" id="patient-phone" placeholder="(123) 456-7890">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address *</label>
                <input type="email" id="patient-email" placeholder="patient@email.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password *</label>
                <input type="password" id="patient-password" placeholder="Min 8 characters with uppercase, lowercase, number">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm Password *</label>
                <input type="password" id="patient-password-confirm" placeholder="Confirm password">
            </div>
            <div id="patient-error" class="error-msg"></div>
            <div id="patient-success" class="success-msg"></div>
            <button class="register-btn" onclick="register('patient')"><i class="fas fa-user-plus"></i> Create Patient Account</button>
        </div>

        <div class="footer-text">
            Already have an account? <a href="/login"><i class="fas fa-sign-in-alt"></i> Login here</a>
        </div>

        <div class="required-note">
            <i class="fas fa-info-circle"></i> Fields marked with * are required
        </div>
        </div>
    </div>

    <script>
        function switchRole(role) {
            document.querySelectorAll('.role-form').forEach(form => form.classList.add('hidden'));
            document.querySelectorAll('.role-tab').forEach(tab => tab.classList.remove('active'));
            
            document.getElementById(role + '-form').classList.remove('hidden');
            event.target.closest('.role-tab').classList.add('active');
        }

        function validateEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        function validatePhone(phone) {
            const cleaned = phone.replace(/\D/g, '');
            return cleaned.length >= 10;
        }

        function validatePassword(password) {
            if (password.length < 8) return false;
            if (!/[A-Z]/.test(password)) return false;
            if (!/[a-z]/.test(password)) return false;
            if (!/[0-9]/.test(password)) return false;
            return true;
        }

        function register(role) {
            const errorDiv = document.getElementById(role + '-error');
            const successDiv = document.getElementById(role + '-success');
            
            errorDiv.innerHTML = '';
            successDiv.innerHTML = '';

            let data = { role };
            let isValid = true;

            if (role === 'doctor') {
                data.name = document.getElementById('doctor-name').value;
                data.specialty = document.getElementById('doctor-specialty').value;
                data.email = document.getElementById('doctor-email').value;
                data.phone = document.getElementById('doctor-phone').value;
                data.password = document.getElementById('doctor-password').value;
                const confirmPass = document.getElementById('doctor-password-confirm').value;

                if (!data.name || !data.specialty || !data.email || !data.phone || !data.password) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please fill all required fields';
                    isValid = false;
                } else if (!validateEmail(data.email)) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                    isValid = false;
                } else if (!validatePhone(data.phone)) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Phone must be at least 10 digits';
                    isValid = false;
                } else if (!validatePassword(data.password)) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password must be 8+ chars with uppercase, lowercase, and number';
                    isValid = false;
                } else if (data.password !== confirmPass) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match';
                    isValid = false;
                }
            } else if (role === 'receptionist') {
                data.name = document.getElementById('receptionist-name').value;
                data.email = document.getElementById('receptionist-email').value;
                data.phone = document.getElementById('receptionist-phone').value;
                data.password = document.getElementById('receptionist-password').value;
                const confirmPass = document.getElementById('receptionist-password-confirm').value;

                if (!data.name || !data.email || !data.phone || !data.password) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please fill all required fields';
                    isValid = false;
                } else if (!validateEmail(data.email)) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                    isValid = false;
                } else if (!validatePhone(data.phone)) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Phone must be at least 10 digits';
                    isValid = false;
                } else if (!validatePassword(data.password)) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password must be 8+ chars with uppercase, lowercase, and number';
                    isValid = false;
                } else if (data.password !== confirmPass) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match';
                    isValid = false;
                }
            } else if (role === 'patient') {
                data.name = document.getElementById('patient-name').value;
                data.age = document.getElementById('patient-age').value;
                data.gender = document.getElementById('patient-gender').value;
                data.email = document.getElementById('patient-email').value;
                data.phone = document.getElementById('patient-phone').value;
                data.password = document.getElementById('patient-password').value;
                const confirmPass = document.getElementById('patient-password-confirm').value;

                if (!data.name || !data.age || !data.gender || !data.email || !data.phone || !data.password) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please fill all required fields';
                    isValid = false;
                } else if (!validateEmail(data.email)) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                    isValid = false;
                } else if (!validatePhone(data.phone)) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Phone must be at least 10 digits';
                    isValid = false;
                } else if (!validatePassword(data.password)) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password must be 8+ chars with uppercase, lowercase, and number';
                    isValid = false;
                } else if (data.password !== confirmPass) {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match';
                    isValid = false;
                }
            }

            if (!isValid) {
                errorDiv.style.display = 'block';
                return;
            }

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => {
                if (!r.ok) {
                    return r.json().then(data => {
                        throw new Error(data.error || 'Registration failed');
                    });
                }
                return r.json();
            })
            .then(result => {
                if (result.success || result.status === 'success') {
                    successDiv.innerHTML = '<i class="fas fa-check-circle"></i> ' + (result.message || 'Account created successfully! Redirecting to login...');
                    successDiv.style.display = 'block';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (result.error || result.message || 'Registration failed');
                    errorDiv.style.display = 'block';
                }
            })
            .catch(err => {
                errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + err.message;
                errorDiv.style.display = 'block';
                console.error('Registration error:', err);
            });
        }
    </script>
</body>
</html>
